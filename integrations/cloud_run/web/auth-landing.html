<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GIRD Auth Landing</title>
  <style>
    body{font-family:Inter, system-ui, -apple-system, Arial;display:flex;align-items:center;justify-content:center;height:100vh;background:#071427;color:#e6eef6}
    .box{background:#0b1b26;padding:24px;border-radius:12px;max-width:720px;width:100%;text-align:center}
    a{color:#7dd3fc}
  </style>
</head>
<body>
  <div class="box">
    <h2>Authentication Successful</h2>
    <p id="msg">Finalizing login...</p>
    <p>If you are not redirected, click <a id="goto">here</a>.</p>
  </div>

<script>
(function(){
  // Expect tokens in fragment: #access=...&refresh=...
  const hash = location.hash.replace(/^#/, '');
  const params = new URLSearchParams(hash);
  const access = params.get('access');
  const refresh = params.get('refresh');
  if(access){ localStorage.setItem('gird_access_token', access); }
  if(refresh){ localStorage.setItem('gird_refresh_token', refresh); }
  // Optionally store user info if provided
  const user = params.get('user'); if(user){ try{ localStorage.setItem('gird_user', user); }catch(e){} }
  document.getElementById('msg').textContent = 'Tokens stored locally.';
  const redirectTo = localStorage.getItem('gird_after_auth') || '/dashboard_full_auth.html';
  document.getElementById('goto').href = redirectTo;
  setTimeout(()=>{ window.location.href = redirectTo; }, 1200);
})();
</script>
</body>
</html>
