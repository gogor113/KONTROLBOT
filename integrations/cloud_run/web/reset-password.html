<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reset Password — GIRD</title>
  <style>
    body{font-family:Inter, system-ui, -apple-system, Arial;background:#071427;color:#e6eef6;display:flex;align-items:center;justify-content:center;height:100vh}
    .card{background:#0b1b26;padding:20px;border-radius:12px;max-width:420px;width:100%}
    input{width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);color:inherit;margin-bottom:10px}
    button{padding:10px 14px;border-radius:8px;border:none;background:#3b82f6;color:white;cursor:pointer}
    .muted{color:#9aa4b2;font-size:13px}
  </style>
</head>
<body>
  <div class="card">
    <h3>Reset Password</h3>
    <p class="muted">Enter the reset token you received and your new password.</p>
    <input id="token" placeholder="Reset token" />
    <input id="newPass" type="password" placeholder="New password" />
    <input id="confirmPass" type="password" placeholder="Confirm password" />
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
      <button id="doReset">Reset Password</button>
    </div>
    <p id="status" class="muted"></p>
  </div>

<script>
(async function(){
  const api = '/auth/reset';
  const tokenField = document.getElementById('token');
  const newPassField = document.getElementById('newPass');
  const confirmField = document.getElementById('confirmPass');
  const btn = document.getElementById('doReset');
  const status = document.getElementById('status');

  // Pre-fill token from query param
  const urlParams = new URLSearchParams(location.search);
  const t = urlParams.get('token'); if(t) tokenField.value = t;

  btn.addEventListener('click', async ()=>{
    const token = tokenField.value.trim();
    const p1 = newPassField.value; const p2 = confirmField.value;
    if(!token || !p1 || !p2) return status.textContent = 'Please fill all fields.';
    if(p1 !== p2) return status.textContent = 'Passwords do not match.';
    status.textContent = 'Sending...';
    try{
      const res = await fetch(api, { method:'POST', headers:{ 'Content-Type':'application/json' }, body: JSON.stringify({ token, newPassword: p1 }) });
      const j = await res.json();
      if(j.ok){ status.textContent = 'Password reset successful. Redirecting to login...'; setTimeout(()=> location.href = '/dashboard_full_auth.html', 1200); }
      else status.textContent = 'Error: ' + (j.error || JSON.stringify(j));
    }catch(e){ status.textContent = 'Network error'; }
  });
})();
</script>
</body>
</html>
